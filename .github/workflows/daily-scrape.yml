name: daily scrape

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    # Self-hosted Linux runner on a cloud VM (~$5/mo, EU region).
    # Datacenter IP passes PH's Cloudflare challenge thanks to curl-cffi
    # TLS-fingerprint impersonation + v2 retry-on-stripped-page fallback
    # (commit 6ff99d79). previous runner retired 2026-06-09.
    runs-on: [self-hosted, linux, x64, hotmap]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # System Python 3 from Ubuntu 26.04. Persist venv in $HOME/.cache so
      # deps install once and reuse across runs.
      - name: Install dependencies (cached venv)
        run: |
          set -e
          VENV="$HOME/.cache/ph-heatmap-venv"
          if [ ! -d "$VENV" ]; then
            python3 -m venv "$VENV"
            "$VENV/bin/pip" install --upgrade -q pip
          fi
          "$VENV/bin/pip" install -q -r requirements.txt
          echo "VENV=$VENV" >> "$GITHUB_ENV"

      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
          PH_IMPERSONATE: ${{ vars.PH_IMPERSONATE || 'chrome120' }}
        run: |
          "$VENV/bin/python" run.py

      - name: Commit and push artifacts
        run: |
          git config user.name "hotmap-bot"
          git config user.email "hotmap-bot@users.noreply.github.com"
          git add data.db public/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): daily snapshot $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
