name: daily scrape

on:
  # schedule disabled temporarily — PH is timing out from Mac runner;
  # see investigation in chat. Re-enable after we confirm connectivity.
  # schedule:
  #   - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    # Self-hosted macOS runner (local IP). The GitHub-hosted Ubuntu
    # pool gets Cloudflare-challenged by Pornhub.
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # On self-hosted macOS we use the system Python 3.13 directly. The
      # actions/setup-python action hardcodes paths like /Users/runner that
      # don't exist on our Mac. We persist a venv in $HOME/.cache so deps
      # install once and reuse on subsequent runs.
      - name: Install dependencies (cached venv)
        run: |
          set -e
          VENV="$HOME/.cache/ph-heatmap-venv"
          if [ ! -d "$VENV" ]; then
            python3 -m venv "$VENV"
            "$VENV/bin/pip" install --upgrade -q pip
          fi
          "$VENV/bin/pip" install -q -r requirements.txt
          echo "VENV=$VENV" >> "$GITHUB_ENV"

      - name: Debug runner env vs PH connectivity
        run: |
          echo "=== whoami / id ==="
          whoami
          id
          echo "=== proxy env ==="
          env | grep -iE 'proxy|http' || echo '  (no proxy env set)'
          echo "=== DNS for pornhub.com ==="
          dscacheutil -q host -a name pornhub.com || true
          echo "=== curl test (no impersonate) ==="
          curl -sS -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" -m 15 'https://www.pornhub.com/pornstars?o=mv&gender=female' || echo "  curl FAILED"
          echo "=== curl-cffi chrome120 test ==="
          "$VENV/bin/python" -c "from curl_cffi import requests; r = requests.get('https://www.pornhub.com/pornstars?o=mv&gender=female', impersonate='chrome120', timeout=15); print('status:', r.status_code, 'len:', len(r.text))" 2>&1 || echo "  curl-cffi FAILED"

      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
          PH_IMPERSONATE: ${{ vars.PH_IMPERSONATE || 'chrome120' }}
        run: |
          "$VENV/bin/python" run.py

      - name: Commit and push artifacts
        run: |
          git config user.name "hotmap-bot"
          git config user.email "hotmap-bot@users.noreply.github.com"
          git add data.db public/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): daily snapshot $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
